name: CI Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  web-tests:
    name: Web Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install web dependencies
        run: npm ci

      - name: Run web tests
        run: npm run test:web

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            apps/api/pyproject.toml
            packages/enhancer-sdk/pyproject.toml

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "packages/enhancer-sdk[dev]" -e "apps/api[dev]"

      - name: Run API and SDK tests
        run: python -m pytest apps/api/tests packages/enhancer-sdk/tests
